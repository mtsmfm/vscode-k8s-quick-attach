on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - run: npm install
      - run: npx vsce publish --pat ${{ secrets.VS_MARKETPLACE_TOKEN }}
      - run: npx ovsx publish --pat ${{ secrets.OPEN_VSX_TOKEN }}
